name: Reel Grátis Final

run-name: Reel ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Código único do Reel"
        required: true
        type: string

      produto1:
        description: "Nome do produto 1"
        required: true
        type: string
      preco1:
        description: "Preço do produto 1"
        required: true
        type: string
      loja1:
        description: "Loja do produto 1"
        required: true
        type: string
      imagem1:
        description: "URL da imagem do produto 1"
        required: true
        type: string

      produto2:
        description: "Nome do produto 2"
        required: true
        type: string
      preco2:
        description: "Preço do produto 2"
        required: true
        type: string
      loja2:
        description: "Loja do produto 2"
        required: true
        type: string
      imagem2:
        description: "URL da imagem do produto 2"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar FFmpeg, fontes e bibliotecas
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install pillow requests

      - name: Preparar logo do Achadinhos
        run: |
          mkdir -p assets
          echo '' | base64 --decode > assets/logo.png
          test -s assets/logo.png

      - name: Criar gerador interno
        run: |
          mkdir -p scripts
          cat > scripts/gerar_reel.py <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations
          
          import math
          import os
          import random
          import re
          import struct
          import subprocess
          import textwrap
          import wave
          from pathlib import Path
          from typing import Iterable
          
          import requests
          from PIL import Image, ImageDraw, ImageFilter, ImageFont, ImageOps
          
          LARGURA = 1080
          ALTURA = 1920
          FPS = 30
          
          COR_FUNDO = "#FFF9ED"
          COR_AMARELO = "#FFD400"
          COR_AMARELO_ESCURO = "#F2B900"
          COR_PRETO = "#1A1A1A"
          COR_BRANCO = "#FFFFFF"
          COR_CINZA = "#5A5A5A"
          COR_LARANJA = "#FF5A1F"
          
          PASTA_TRABALHO = Path("reel_tmp")
          PASTA_PUBLICA = Path("public/reels")
          PASTA_ASSETS = Path("assets")
          
          FONTE_REGULAR = Path(
              "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"
          )
          FONTE_NEGRITO = Path(
              "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          )
          
          
          def env(nome: str) -> str:
              return os.environ.get(nome, "").strip()
          
          
          def limpar_job_id(valor: str) -> str:
              limpo = re.sub(r"[^A-Za-z0-9_-]", "-", valor.strip())
              limpo = re.sub(r"-+", "-", limpo).strip("-")
              if not limpo:
                  raise ValueError("JOB_ID vazio ou inválido.")
              return limpo[:100]
          
          
          def fonte(tamanho: int, negrito: bool = False) -> ImageFont.FreeTypeFont:
              caminho = FONTE_NEGRITO if negrito else FONTE_REGULAR
              return ImageFont.truetype(str(caminho), tamanho)
          
          
          def executar(comando: list[str]) -> None:
              print("Executando:", " ".join(comando))
              subprocess.run(comando, check=True)
          
          
          def baixar_imagem(url: str, destino: Path) -> Path:
              if not re.match(r"^https?://", url, flags=re.I):
                  raise ValueError(f"URL de imagem inválida: {url}")
          
              resposta = requests.get(
                  url,
                  timeout=40,
                  allow_redirects=True,
                  headers={
                      "User-Agent": (
                          "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                          "AppleWebKit/537.36 Chrome/150.0 Safari/537.36"
                      ),
                      "Accept": "image/avif,image/webp,image/apng,image/*,*/*;q=0.8",
                  },
              )
              resposta.raise_for_status()
          
              if len(resposta.content) < 1000:
                  raise ValueError("A imagem recebida está vazia ou muito pequena.")
          
              destino.write_bytes(resposta.content)
          
              with Image.open(destino) as imagem:
                  rgb = imagem.convert("RGB")
                  saida = destino.with_suffix(".jpg")
                  rgb.save(saida, quality=95)
          
              destino.unlink(missing_ok=True)
              return saida
          
          
          def arredondar(imagem: Image.Image, raio: int) -> Image.Image:
              mascara = Image.new("L", imagem.size, 0)
              desenho = ImageDraw.Draw(mascara)
              desenho.rounded_rectangle(
                  (0, 0, imagem.width - 1, imagem.height - 1),
                  radius=raio,
                  fill=255,
              )
              saida = Image.new("RGBA", imagem.size, (0, 0, 0, 0))
              saida.paste(imagem.convert("RGBA"), (0, 0), mascara)
              return saida
          
          
          def encaixar_imagem(caminho: Path, largura: int, altura: int) -> Image.Image:
              with Image.open(caminho) as original:
                  imagem = original.convert("RGB")
          
              imagem.thumbnail(
                  (largura - 50, altura - 50),
                  Image.Resampling.LANCZOS,
              )
          
              quadro = Image.new("RGB", (largura, altura), COR_BRANCO)
              x = (largura - imagem.width) // 2
              y = (altura - imagem.height) // 2
              quadro.paste(imagem, (x, y))
              return arredondar(quadro, 52)
          
          
          def adicionar_sombra(
              base: Image.Image,
              caixa: tuple[int, int, int, int],
              raio: int = 45,
              desfoque: int = 20,
              deslocamento: tuple[int, int] = (0, 12),
              opacidade: int = 65,
          ) -> None:
              sombra = Image.new("RGBA", base.size, (0, 0, 0, 0))
              desenho = ImageDraw.Draw(sombra)
              x1, y1, x2, y2 = caixa
              dx, dy = deslocamento
              desenho.rounded_rectangle(
                  (x1 + dx, y1 + dy, x2 + dx, y2 + dy),
                  radius=raio,
                  fill=(0, 0, 0, opacidade),
              )
              sombra = sombra.filter(ImageFilter.GaussianBlur(desfoque))
              base.alpha_composite(sombra)
          
          
          def desenhar_caixa(
              imagem: Image.Image,
              caixa: tuple[int, int, int, int],
              preenchimento: str,
              raio: int = 40,
              contorno: str | None = None,
              espessura: int = 0,
              sombra: bool = False,
          ) -> None:
              if sombra:
                  adicionar_sombra(imagem, caixa, raio=raio)
          
              desenho = ImageDraw.Draw(imagem)
              desenho.rounded_rectangle(
                  caixa,
                  radius=raio,
                  fill=preenchimento,
                  outline=contorno,
                  width=espessura,
              )
          
          
          def quebrar_texto(
              desenho: ImageDraw.ImageDraw,
              texto: str,
              fonte_texto: ImageFont.FreeTypeFont,
              largura_maxima: int,
              max_linhas: int,
          ) -> list[str]:
              palavras = texto.split()
              linhas: list[str] = []
              atual = ""
          
              for palavra in palavras:
                  teste = palavra if not atual else f"{atual} {palavra}"
                  caixa = desenho.textbbox((0, 0), teste, font=fonte_texto)
                  largura = caixa[2] - caixa[0]
          
                  if largura <= largura_maxima:
                      atual = teste
                  else:
                      if atual:
                          linhas.append(atual)
                      atual = palavra
          
                  if len(linhas) >= max_linhas:
                      break
          
              if atual and len(linhas) < max_linhas:
                  linhas.append(atual)
          
              texto_usado = " ".join(linhas)
              if len(texto_usado) < len(texto.strip()) and linhas:
                  ultima = linhas[-1].rstrip(".,;:!?")
                  while ultima:
                      teste = ultima + "..."
                      caixa = desenho.textbbox((0, 0), teste, font=fonte_texto)
                      if caixa[2] - caixa[0] <= largura_maxima:
                          linhas[-1] = teste
                          break
                      ultima = ultima[:-1].rstrip()
          
              return linhas
          
          
          def desenhar_texto_centralizado(
              desenho: ImageDraw.ImageDraw,
              linhas: Iterable[str],
              y_inicial: int,
              fonte_texto: ImageFont.FreeTypeFont,
              cor: str,
              espacamento: int = 12,
          ) -> int:
              y = y_inicial
          
              for linha in linhas:
                  caixa = desenho.textbbox((0, 0), linha, font=fonte_texto)
                  largura = caixa[2] - caixa[0]
                  altura = caixa[3] - caixa[1]
                  x = (LARGURA - largura) // 2
                  desenho.text((x, y), linha, font=fonte_texto, fill=cor)
                  y += altura + espacamento
          
              return y
          
          
          def desenhar_texto_em_caixa(
              desenho: ImageDraw.ImageDraw,
              linhas: Iterable[str],
              caixa_destino: tuple[int, int, int, int],
              fonte_texto: ImageFont.FreeTypeFont,
              cor: str,
              espacamento: int = 6,
          ) -> None:
              linhas_lista = list(linhas)
              alturas = []
              larguras = []
          
              for linha in linhas_lista:
                  caixa = desenho.textbbox((0, 0), linha, font=fonte_texto)
                  larguras.append(caixa[2] - caixa[0])
                  alturas.append(caixa[3] - caixa[1])
          
              total_altura = sum(alturas) + espacamento * max(0, len(linhas_lista) - 1)
              x1, y1, x2, y2 = caixa_destino
              y = y1 + (y2 - y1 - total_altura) // 2
          
              for linha, largura, altura in zip(linhas_lista, larguras, alturas):
                  x = x1 + (x2 - x1 - largura) // 2
                  desenho.text((x, y), linha, font=fonte_texto, fill=cor)
                  y += altura + espacamento
          
          
          def colar_logo(
              imagem: Image.Image,
              x: int,
              y: int,
              tamanho: int,
              com_fundo: bool = True,
          ) -> None:
              caminho = PASTA_ASSETS / "logo.png"
              with Image.open(caminho) as original:
                  logo = original.convert("RGBA")
          
              logo.thumbnail((tamanho, tamanho), Image.Resampling.LANCZOS)
          
              if com_fundo:
                  fundo = Image.new("RGBA", (tamanho + 18, tamanho + 18), (0, 0, 0, 0))
                  d = ImageDraw.Draw(fundo)
                  d.ellipse(
                      (0, 0, tamanho + 17, tamanho + 17),
                      fill=COR_BRANCO,
                      outline=COR_AMARELO_ESCURO,
                      width=5,
                  )
                  fundo.alpha_composite(
                      logo,
                      (
                          (fundo.width - logo.width) // 2,
                          (fundo.height - logo.height) // 2,
                      ),
                  )
                  imagem.alpha_composite(fundo, (x, y))
              else:
                  imagem.alpha_composite(logo, (x, y))
          
          
          def criar_capa(destino: Path) -> None:
              imagem = Image.new("RGBA", (LARGURA, ALTURA), COR_FUNDO)
              desenho = ImageDraw.Draw(imagem)
          
              desenho.rectangle((0, 0, LARGURA, 520), fill=COR_AMARELO)
              desenho.rectangle((0, 520, LARGURA, 555), fill=COR_PRETO)
          
              colar_logo(imagem, 360, 75, 340)
          
              desenhar_caixa(
                  imagem,
                  (90, 650, 990, 1210),
                  COR_PRETO,
                  raio=70,
                  sombra=True,
              )
          
              desenhar_texto_centralizado(
                  desenho,
                  ["OFERTAS", "DO DIA"],
                  755,
                  fonte(105, True),
                  COR_BRANCO,
                  18,
              )
          
              desenhar_caixa(
                  imagem,
                  (175, 1265, 905, 1395),
                  COR_AMARELO,
                  raio=36,
              )
          
              texto = "2 ACHADINHOS IMPERDÍVEIS"
              f = fonte(39, True)
              caixa = desenho.textbbox((0, 0), texto, font=f)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1307),
                  texto,
                  font=f,
                  fill=COR_PRETO,
              )
          
              desenhar_caixa(
                  imagem,
                  (170, 1505, 910, 1665),
                  COR_BRANCO,
                  raio=42,
                  contorno=COR_AMARELO_ESCURO,
                  espessura=6,
                  sombra=True,
              )
          
              chamada = "CONFIRA NO LINK DA BIO"
              f_chamada = fonte(42, True)
              caixa = desenho.textbbox((0, 0), chamada, font=f_chamada)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1553),
                  chamada,
                  font=f_chamada,
                  fill=COR_PRETO,
              )
          
              usuario = "@achadinhosdotiagom"
              f_usuario = fonte(31, True)
              caixa = desenho.textbbox((0, 0), usuario, font=f_usuario)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1780),
                  usuario,
                  font=f_usuario,
                  fill=COR_CINZA,
              )
          
              imagem.convert("RGB").save(destino, quality=96)
          
          
          def criar_slide_produto(
              destino: Path,
              indice: int,
              produto: str,
              preco: str,
              loja: str,
              imagem_produto: Path,
          ) -> None:
              imagem = Image.new("RGBA", (LARGURA, ALTURA), COR_FUNDO)
              desenho = ImageDraw.Draw(imagem)
          
              desenho.rectangle((0, 0, LARGURA, 225), fill=COR_AMARELO)
              desenho.rectangle((0, 225, LARGURA, 242), fill=COR_PRETO)
          
              colar_logo(imagem, 28, 22, 165)
          
              selo_topo = f"{indice}/2  OFERTA DO DIA"
              f_topo = fonte(43, True)
              caixa = desenho.textbbox((0, 0), selo_topo, font=f_topo)
              desenho.text(
                  (LARGURA - (caixa[2] - caixa[0]) - 55, 76),
                  selo_topo,
                  font=f_topo,
                  fill=COR_PRETO,
              )
          
              titulo_caixa = (58, 285, 1022, 480)
              desenhar_caixa(
                  imagem,
                  titulo_caixa,
                  COR_BRANCO,
                  raio=42,
                  contorno=COR_AMARELO_ESCURO,
                  espessura=4,
                  sombra=True,
              )
          
              tamanho_titulo = 48
              if len(produto) > 58:
                  tamanho_titulo = 42
              if len(produto) > 82:
                  tamanho_titulo = 36
          
              f_produto = fonte(tamanho_titulo, True)
              linhas = quebrar_texto(
                  desenho,
                  produto,
                  f_produto,
                  850,
                  3,
              )
              alturas = [
                  desenho.textbbox((0, 0), linha, font=f_produto)[3]
                  - desenho.textbbox((0, 0), linha, font=f_produto)[1]
                  for linha in linhas
              ]
              total = sum(alturas) + 10 * max(0, len(linhas) - 1)
              y_titulo = titulo_caixa[1] + (titulo_caixa[3] - titulo_caixa[1] - total) // 2
          
              desenhar_texto_centralizado(
                  desenho,
                  linhas,
                  y_titulo,
                  f_produto,
                  COR_PRETO,
                  10,
              )
          
              moldura = (65, 535, 1015, 1295)
              desenhar_caixa(
                  imagem,
                  moldura,
                  COR_AMARELO,
                  raio=58,
                  sombra=True,
              )
          
              quadro = encaixar_imagem(imagem_produto, 900, 710)
              imagem.alpha_composite(quadro, (90, 560))
          
              # Selo maior e com fonte pequena para não cortar.
              desenho.ellipse(
                  (810, 495, 1018, 703),
                  fill=COR_AMARELO,
                  outline=COR_PRETO,
                  width=5,
              )
              f_selo = fonte(28, True)
              desenhar_texto_em_caixa(
                  desenho,
                  ["OFERTA", "LIMITADA"],
                  (810, 495, 1018, 703),
                  f_selo,
                  COR_PRETO,
                  6,
              )
          
              desenhar_caixa(
                  imagem,
                  (65, 1340, 1015, 1515),
                  COR_AMARELO,
                  raio=44,
                  sombra=True,
              )
              texto_preco = f"POR {preco}"
              f_preco = fonte(66, True)
              caixa = desenho.textbbox((0, 0), texto_preco, font=f_preco)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1383),
                  texto_preco,
                  font=f_preco,
                  fill=COR_PRETO,
              )
          
              desenhar_caixa(
                  imagem,
                  (65, 1560, 475, 1688),
                  COR_BRANCO,
                  raio=34,
                  contorno=COR_AMARELO_ESCURO,
                  espessura=4,
              )
              texto_loja = f"LOJA: {loja}"
              f_loja = fonte(31, True)
              caixa = desenho.textbbox((0, 0), texto_loja, font=f_loja)
              desenho.text(
                  (270 - (caixa[2] - caixa[0]) // 2, 1601),
                  texto_loja,
                  font=f_loja,
                  fill=COR_PRETO,
              )
          
              desenhar_caixa(
                  imagem,
                  (500, 1560, 1015, 1688),
                  COR_AMARELO,
                  raio=34,
              )
              cta = "LINK NA BIO"
              f_cta = fonte(42, True)
              caixa = desenho.textbbox((0, 0), cta, font=f_cta)
              desenho.text(
                  (758 - (caixa[2] - caixa[0]) // 2, 1592),
                  cta,
                  font=f_cta,
                  fill=COR_PRETO,
              )
          
              rodape = "OFERTAS REAIS  •  PREÇOS BAIXOS  •  TODOS OS DIAS"
              f_rodape = fonte(25, True)
              caixa = desenho.textbbox((0, 0), rodape, font=f_rodape)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1790),
                  rodape,
                  font=f_rodape,
                  fill=COR_CINZA,
              )
          
              imagem.convert("RGB").save(destino, quality=96)
          
          
          def criar_final(destino: Path) -> None:
              imagem = Image.new("RGBA", (LARGURA, ALTURA), COR_FUNDO)
              desenho = ImageDraw.Draw(imagem)
          
              desenho.rectangle((0, 0, LARGURA, 430), fill=COR_AMARELO)
              colar_logo(imagem, 360, 55, 340)
          
              desenhar_caixa(
                  imagem,
                  (80, 535, 1000, 1160),
                  COR_PRETO,
                  raio=70,
                  sombra=True,
              )
          
              desenhar_texto_centralizado(
                  desenho,
                  ["QUER MAIS", "ACHADINHOS?"],
                  660,
                  fonte(82, True),
                  COR_BRANCO,
                  18,
              )
          
              desenhar_caixa(
                  imagem,
                  (145, 1240, 935, 1415),
                  COR_AMARELO,
                  raio=44,
                  sombra=True,
              )
          
              texto = "ACESSE O LINK DA BIO"
              f = fonte(47, True)
              caixa = desenho.textbbox((0, 0), texto, font=f)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1291),
                  texto,
                  font=f,
                  fill=COR_PRETO,
              )
          
              desenhar_caixa(
                  imagem,
                  (145, 1470, 935, 1635),
                  COR_BRANCO,
                  raio=44,
                  contorno=COR_AMARELO_ESCURO,
                  espessura=5,
              )
          
              telegram = "ENTRE NO CANAL VIP DO TELEGRAM"
              f_telegram = fonte(34, True)
              caixa = desenho.textbbox((0, 0), telegram, font=f_telegram)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1523),
                  telegram,
                  font=f_telegram,
                  fill=COR_PRETO,
              )
          
              usuario = "@achadinhosdotiagom"
              f_usuario = fonte(33, True)
              caixa = desenho.textbbox((0, 0), usuario, font=f_usuario)
              desenho.text(
                  ((LARGURA - (caixa[2] - caixa[0])) // 2, 1770),
                  usuario,
                  font=f_usuario,
                  fill=COR_CINZA,
              )
          
              imagem.convert("RGB").save(destino, quality=96)
          
          
          def gerar_musica(destino: Path, duracao: float) -> None:
              taxa = 44100
              total = int(taxa * duracao)
              random.seed(20260724)
          
              # Progressão original e simples: C - Am - F - G.
              acordes = [
                  (261.63, 329.63, 392.00),
                  (220.00, 261.63, 329.63),
                  (174.61, 220.00, 261.63),
                  (196.00, 246.94, 293.66),
              ]
          
              with wave.open(str(destino), "wb") as wav:
                  wav.setnchannels(2)
                  wav.setsampwidth(2)
                  wav.setframerate(taxa)
          
                  quadros = bytearray()
          
                  for i in range(total):
                      t = i / taxa
                      acorde = acordes[int(t // 2) % len(acordes)]
          
                      # Base harmônica suave.
                      base = sum(
                          math.sin(2 * math.pi * freq * t)
                          for freq in acorde
                      ) / 3.0
          
                      # Arpejo curto a cada 1/4 de segundo.
                      passo = int(t / 0.25)
                      inicio_passo = passo * 0.25
                      local = t - inicio_passo
                      freq_arpejo = acorde[passo % 3] * 2
                      envelope = math.exp(-8.0 * local)
                      arpejo = math.sin(
                          2 * math.pi * freq_arpejo * local
                      ) * envelope
          
                      # Batida leve a 120 BPM.
                      batida_local = t % 0.5
                      kick = 0.0
                      if batida_local < 0.12:
                          kick = (
                              math.sin(
                                  2 * math.pi *
                                  (75 - 30 * batida_local / 0.12) *
                                  batida_local
                              ) *
                              math.exp(-22 * batida_local)
                          )
          
                      # Estalo bem leve nos contratempos.
                      clap = 0.0
                      deslocado = (t - 0.25) % 0.5
                      if deslocado < 0.045:
                          clap = (
                              random.uniform(-1, 1) *
                              math.exp(-55 * deslocado)
                          )
          
                      amostra = (
                          0.18 * base +
                          0.26 * arpejo +
                          0.35 * kick +
                          0.07 * clap
                      )
          
                      # Fade de entrada e saída.
                      ganho = min(1.0, t / 0.7)
                      ganho *= min(1.0, max(0.0, (duracao - t) / 0.9))
                      amostra *= ganho * 0.62
          
                      inteiro = int(
                          max(-1.0, min(1.0, amostra)) * 32767
                      )
                      quadros.extend(struct.pack("<hh", inteiro, inteiro))
          
                  wav.writeframes(quadros)
          
          
          def criar_trecho(
              imagem: Path,
              duracao: float,
              destino: Path,
          ) -> None:
              fade_out = max(0.0, duracao - 0.30)
          
              filtro = (
                  f"scale={LARGURA}:{ALTURA}:"
                  "force_original_aspect_ratio=decrease,"
                  f"pad={LARGURA}:{ALTURA}:"
                  "(ow-iw)/2:(oh-ih)/2:"
                  f"color={COR_FUNDO},"
                  "format=yuv420p,"
                  "fade=t=in:st=0:d=0.28:"
                  f"color={COR_FUNDO},"
                  "fade=t=out:"
                  f"st={fade_out:.2f}:d=0.28:"
                  f"color={COR_FUNDO}"
              )
          
              executar(
                  [
                      "ffmpeg",
                      "-y",
                      "-loop",
                      "1",
                      "-i",
                      str(imagem),
                      "-t",
                      str(duracao),
                      "-r",
                      str(FPS),
                      "-vf",
                      filtro,
                      "-an",
                      "-c:v",
                      "libx264",
                      "-preset",
                      "medium",
                      "-crf",
                      "19",
                      "-pix_fmt",
                      "yuv420p",
                      "-movflags",
                      "+faststart",
                      str(destino),
                  ]
              )
          
          
          def concatenar_trechos(
              trechos: list[Path],
              musica: Path,
              destino: Path,
              duracao_total: float,
          ) -> None:
              lista = PASTA_TRABALHO / "lista.txt"
              lista.write_text(
                  "".join(
                      f"file '{trecho.resolve()}'\n"
                      for trecho in trechos
                  ),
                  encoding="utf-8",
              )
          
              video_sem_audio = (
                  PASTA_TRABALHO /
                  "video_sem_audio.mp4"
              )
          
              executar(
                  [
                      "ffmpeg",
                      "-y",
                      "-f",
                      "concat",
                      "-safe",
                      "0",
                      "-i",
                      str(lista),
                      "-c",
                      "copy",
                      str(video_sem_audio),
                  ]
              )
          
              inicio_fade_saida = max(0.0, duracao_total - 1.0)
          
              executar(
                  [
                      "ffmpeg",
                      "-y",
                      "-i",
                      str(video_sem_audio),
                      "-i",
                      str(musica),
                      "-filter_complex",
                      (
                          "[1:a]"
                          "volume=0.30,"
                          "afade=t=in:st=0:d=0.60,"
                          f"afade=t=out:st={inicio_fade_saida:.2f}:d=0.90"
                          "[musica]"
                      ),
                      "-map",
                      "0:v:0",
                      "-map",
                      "[musica]",
                      "-shortest",
                      "-c:v",
                      "copy",
                      "-c:a",
                      "aac",
                      "-b:a",
                      "160k",
                      "-ar",
                      "44100",
                      "-movflags",
                      "+faststart",
                      str(destino),
                  ]
              )
          
          
          def main() -> None:
              job_id = limpar_job_id(env("JOB_ID"))
          
              produtos = [
                  {
                      "produto": env(f"PRODUTO_{indice}"),
                      "preco": env(f"PRECO_{indice}"),
                      "loja": env(f"LOJA_{indice}"),
                      "imagem": env(f"IMAGEM_{indice}"),
                  }
                  for indice in range(1, 3)
              ]
          
              for indice, produto in enumerate(produtos, start=1):
                  faltando = [
                      chave
                      for chave in ("produto", "preco", "loja", "imagem")
                      if not produto[chave]
                  ]
                  if faltando:
                      raise ValueError(
                          f"Produto {indice} sem: {', '.join(faltando)}."
                      )
          
              PASTA_TRABALHO.mkdir(parents=True, exist_ok=True)
              PASTA_PUBLICA.mkdir(parents=True, exist_ok=True)
              PASTA_ASSETS.mkdir(parents=True, exist_ok=True)
          
              capa = PASTA_TRABALHO / "capa.png"
              final = PASTA_TRABALHO / "final.png"
          
              criar_capa(capa)
              criar_final(final)
          
              slides: list[Path] = []
          
              for indice, produto in enumerate(produtos, start=1):
                  imagem_baixada = baixar_imagem(
                      produto["imagem"],
                      PASTA_TRABALHO / f"produto-{indice}.bin",
                  )
          
                  slide = PASTA_TRABALHO / f"slide-{indice}.png"
          
                  criar_slide_produto(
                      slide,
                      indice,
                      produto["produto"],
                      produto["preco"],
                      produto["loja"],
                      imagem_baixada,
                  )
          
                  slides.append(slide)
          
              imagens = [capa, *slides, final]
              duracoes = [2.2, 5.0, 5.0, 3.0]
          
              trechos: list[Path] = []
          
              for indice, (imagem, duracao) in enumerate(
                  zip(imagens, duracoes),
                  start=1,
              ):
                  trecho = PASTA_TRABALHO / f"trecho-{indice}.mp4"
                  criar_trecho(imagem, duracao, trecho)
                  trechos.append(trecho)
          
              duracao_total = sum(duracoes)
              musica = PASTA_TRABALHO / "musica-original.wav"
              gerar_musica(musica, duracao_total)
          
              destino = PASTA_PUBLICA / f"{job_id}.mp4"
              concatenar_trechos(
                  trechos,
                  musica,
                  destino,
                  duracao_total,
              )
          
              tamanho = destino.stat().st_size
              if tamanho < 100_000:
                  raise RuntimeError(
                      "O vídeo final ficou pequeno demais e parece inválido."
                  )
          
              print(
                  f"Reel criado: {destino} "
                  f"({tamanho} bytes, música original incluída)"
              )
          
          
          if __name__ == "__main__":
              main()
          PY
          python -m py_compile scripts/gerar_reel.py

      - name: Gerar vídeo vertical com música
        env:
          JOB_ID: ${{ inputs.job_id }}

          PRODUTO_1: ${{ inputs.produto1 }}
          PRECO_1: ${{ inputs.preco1 }}
          LOJA_1: ${{ inputs.loja1 }}
          IMAGEM_1: ${{ inputs.imagem1 }}

          PRODUTO_2: ${{ inputs.produto2 }}
          PRECO_2: ${{ inputs.preco2 }}
          LOJA_2: ${{ inputs.loja2 }}
          IMAGEM_2: ${{ inputs.imagem2 }}
        run: |
          python scripts/gerar_reel.py

      - name: Preparar arquivos públicos
        run: |
          mkdir -p public/reels
          test -f "public/reels/${{ inputs.job_id }}.mp4"
